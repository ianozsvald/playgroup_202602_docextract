<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow2" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="geminiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27AE60"/>
      <stop offset="100%" style="stop-color:#2ECC71"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2874A6"/>
      <stop offset="100%" style="stop-color:#3498DB"/>
    </linearGradient>
    <linearGradient id="claude35Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5499C7"/>
      <stop offset="100%" style="stop-color:#85C1E9"/>
    </linearGradient>
    <linearGradient id="flashGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AC0D"/>
      <stop offset="100%" style="stop-color:#F4D03F"/>
    </linearGradient>
    <linearGradient id="gptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#F0B27A"/>
    </linearGradient>
    <linearGradient id="llamaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CB4335"/>
      <stop offset="100%" style="stop-color:#EC7063"/>
    </linearGradient>
    <linearGradient id="qwenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A93226"/>
      <stop offset="100%" style="stop-color:#D98880"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#F8F9FA"/>

  <!-- Title -->
  <g opacity="0">
    <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Model Performance on TheAgentCompany (175 tasks)</text>
    <text x="440" y="50" text-anchor="middle" font-size="11" fill="#7F8C8D">Success Rate (%) — Full task completion | Bars grow to show relative capability</text>
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Axis -->
  <g opacity="0">
    <line x1="240" y1="70" x2="240" y2="455" stroke="#BDC3C7" stroke-width="1"/>
    <line x1="240" y1="455" x2="850" y2="455" stroke="#BDC3C7" stroke-width="1"/>
    <!-- Tick marks -->
    <line x1="240" y1="455" x2="240" y2="460" stroke="#BDC3C7" stroke-width="1"/>
    <text x="240" y="475" text-anchor="middle" font-size="10" fill="#7F8C8D">0%</text>
    <line x1="440" y1="455" x2="440" y2="460" stroke="#BDC3C7" stroke-width="1"/>
    <text x="440" y="475" text-anchor="middle" font-size="10" fill="#7F8C8D">10%</text>
    <line x1="640" y1="455" x2="640" y2="460" stroke="#BDC3C7" stroke-width="1"/>
    <text x="640" y="475" text-anchor="middle" font-size="10" fill="#7F8C8D">20%</text>
    <line x1="840" y1="455" x2="840" y2="460" stroke="#BDC3C7" stroke-width="1"/>
    <text x="840" y="475" text-anchor="middle" font-size="10" fill="#7F8C8D">30%</text>
    <!-- Grid lines -->
    <line x1="440" y1="70" x2="440" y2="455" stroke="#EAECEE" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="640" y1="70" x2="640" y2="455" stroke="#EAECEE" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="840" y1="70" x2="840" y2="455" stroke="#EAECEE" stroke-width="1" stroke-dasharray="4,4"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- TIER 1 LABEL -->
  <g opacity="0">
    <rect x="8" y="68" width="70" height="120" rx="6" fill="#27AE60" opacity="0.12"/>
    <text x="43" y="92" text-anchor="middle" font-size="10" font-weight="bold" fill="#27AE60">TIER 1</text>
    <text x="43" y="106" text-anchor="middle" font-size="8" fill="#27AE60">24-30%</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Bar 1: Gemini 2.5 Pro — 30.3% -->
  <g opacity="0">
    <text x="235" y="95" text-anchor="end" font-size="11" font-weight="bold" fill="#2C3E50">Gemini 2.5 Pro</text>
    <rect x="240" y="80" width="0" height="28" rx="4" fill="url(#geminiGrad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="606" begin="0.8s" dur="0.8s" fill="freeze"/>
    </rect>
    <text x="852" y="99" font-size="11" font-weight="bold" fill="#27AE60" opacity="0">30.3%  $4.20
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Bar 2: Claude 3.7 Sonnet — 26.3% -->
  <g opacity="0">
    <text x="235" y="140" text-anchor="end" font-size="11" font-weight="bold" fill="#2C3E50">Claude 3.7 Sonnet</text>
    <rect x="240" y="125" width="0" height="28" rx="4" fill="url(#claudeGrad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="526" begin="1.2s" dur="0.7s" fill="freeze"/>
    </rect>
    <text x="772" y="144" font-size="11" font-weight="bold" fill="#2874A6" opacity="0">26.3%  $4.10
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Bar 3: Claude 3.5 Sonnet — 24.0% -->
  <g opacity="0">
    <text x="235" y="185" text-anchor="end" font-size="11" fill="#2C3E50">Claude 3.5 Sonnet</text>
    <rect x="240" y="170" width="0" height="28" rx="4" fill="url(#claude35Grad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="480" begin="1.5s" dur="0.7s" fill="freeze"/>
    </rect>
    <text x="726" y="189" font-size="11" fill="#5499C7" opacity="0">24.0%  $6.30
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- GAP INDICATOR 1 -->
  <g opacity="0">
    <line x1="100" y1="208" x2="830" y2="208" stroke="#E74C3C" stroke-width="1" stroke-dasharray="6,3"/>
    <rect x="380" y="200" width="120" height="18" rx="4" fill="#E74C3C"/>
    <text x="440" y="213" text-anchor="middle" font-size="9" font-weight="bold" fill="white">▼ ~3× GAP ▼</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- TIER 2 LABEL -->
  <g opacity="0">
    <rect x="8" y="225" width="70" height="130" rx="6" fill="#F39C12" opacity="0.12"/>
    <text x="43" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#F39C12">TIER 2</text>
    <text x="43" y="264" text-anchor="middle" font-size="8" fill="#F39C12">7-11%</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Bar 4: Gemini 2.0 Flash — 11.4% -->
  <g opacity="0">
    <text x="235" y="250" text-anchor="end" font-size="11" fill="#2C3E50">Gemini 2.0 Flash</text>
    <rect x="240" y="235" width="0" height="28" rx="4" fill="url(#flashGrad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="228" begin="2.9s" dur="0.6s" fill="freeze"/>
    </rect>
    <text x="474" y="254" font-size="11" fill="#D4AC0D" opacity="0">11.4%  💰$0.60
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Bar 5: GPT-4o — 8.6% -->
  <g opacity="0">
    <text x="235" y="295" text-anchor="end" font-size="11" fill="#2C3E50">GPT-4o</text>
    <rect x="240" y="280" width="0" height="28" rx="4" fill="url(#gptGrad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="172" begin="3.2s" dur="0.5s" fill="freeze"/>
    </rect>
    <text x="418" y="299" font-size="11" fill="#E67E22" opacity="0">8.6%  $1.30
      <animate attributeName="opacity" from="0" to="1" begin="3.7s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Bar 6: Llama 3.1 405B — 7.4% -->
  <g opacity="0">
    <text x="235" y="340" text-anchor="end" font-size="11" fill="#2C3E50">Llama 3.1 405B</text>
    <rect x="240" y="325" width="0" height="28" rx="4" fill="url(#llamaGrad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="148" begin="3.5s" dur="0.5s" fill="freeze"/>
    </rect>
    <text x="394" y="344" font-size="11" fill="#CB4335" opacity="0">7.4%  (open)
      <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- GAP INDICATOR 2 -->
  <g opacity="0">
    <line x1="100" y1="363" x2="830" y2="363" stroke="#E74C3C" stroke-width="1" stroke-dasharray="6,3"/>
    <rect x="370" y="355" width="140" height="18" rx="4" fill="#E74C3C"/>
    <text x="440" y="368" text-anchor="middle" font-size="9" font-weight="bold" fill="white">▼ 2-5× GAP ▼</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- TIER 3 LABEL -->
  <g opacity="0">
    <rect x="8" y="380" width="70" height="70" rx="6" fill="#E74C3C" opacity="0.12"/>
    <text x="43" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="#E74C3C">TIER 3</text>
    <text x="43" y="419" text-anchor="middle" font-size="8" fill="#E74C3C">1-6%</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Bar 7: Qwen 2.5 72B — 5.7% -->
  <g opacity="0">
    <text x="235" y="400" text-anchor="end" font-size="11" fill="#2C3E50">Qwen 2.5 72B</text>
    <rect x="240" y="385" width="0" height="28" rx="4" fill="url(#qwenGrad)" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="114" begin="4.6s" dur="0.4s" fill="freeze"/>
    </rect>
    <text x="360" y="404" font-size="11" fill="#A93226" opacity="0">5.7%  (open)
      <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Bar 8: OWL RolePlay — 4.0% -->
  <g opacity="0">
    <text x="235" y="443" text-anchor="end" font-size="11" fill="#7F8C8D">OWL RolePlay</text>
    <rect x="240" y="428" width="0" height="24" rx="4" fill="#BDC3C7" filter="url(#shadow2)">
      <animate attributeName="width" from="0" to="80" begin="4.9s" dur="0.4s" fill="freeze"/>
    </rect>
    <text x="326" y="445" font-size="10" fill="#7F8C8D" opacity="0">4.0% (multi-agent)
      <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.3s" fill="freeze"/>
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Bottom insight -->
  <g opacity="0">
    <text x="440" y="498" text-anchor="middle" font-size="10" fill="#5D6D7E">💡 Gemini Flash: best cost/performance ratio · GPT-4o: surprisingly weak · Multi-agent: hurts not helps</text>
    <text x="440" y="514" text-anchor="middle" font-size="9" fill="#95A5A6">Cost shown per task (avg) · Open-weight models 3-5× behind proprietary</text>
    <animate attributeName="opacity" from="0" to="1" begin="5.5s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
