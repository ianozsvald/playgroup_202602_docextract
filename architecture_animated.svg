<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#357ABD"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#3498DB"/>
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58D68D"/>
      <stop offset="100%" style="stop-color:#2ECC71"/>
    </linearGradient>
    <linearGradient id="npcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC7063"/>
      <stop offset="100%" style="stop-color:#E74C3C"/>
    </linearGradient>
    <linearGradient id="evalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5B041"/>
      <stop offset="100%" style="stop-color:#F39C12"/>
    </linearGradient>
    <marker id="arrowGray" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7F8C8D"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#F8F9FA"/>

  <!-- Title -->
  <g opacity="0">
    <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">TheAgentCompany — Architecture</text>
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.6s" fill="freeze"/>
  </g>

  <!-- LAYER 1: Agent (top) -->
  <g opacity="0">
    <rect x="330" y="55" width="240" height="50" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
    <text x="450" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🤖 Agent</text>
    <text x="450" y="95" text-anchor="middle" font-size="10" fill="#D6EAF8">OpenHands CodeAct / OWL RolePlay</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- Arrow: Agent → Docker Sandbox -->
  <g opacity="0">
    <line x1="450" y1="105" x2="450" y2="135" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowGray)"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- LAYER 2: Docker Sandbox -->
  <g opacity="0">
    <rect x="120" y="140" width="660" height="55" rx="10" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1.5"/>
    <text x="450" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Local Workspace — Docker Sandbox</text>
    <text x="450" y="180" text-anchor="middle" font-size="10" fill="#5D6D7E">Sandboxed environment = agent's "work laptop"</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- LAYER 3: Three tools -->
  <g opacity="0">
    <!-- Arrows from sandbox to tools -->
    <line x1="270" y1="195" x2="200" y2="225" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="450" y1="195" x2="450" y2="225" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="630" y1="195" x2="700" y2="225" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Browser -->
    <rect x="110" y="230" width="180" height="45" rx="8" fill="url(#toolGrad)" filter="url(#shadow)"/>
    <text x="200" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🌐 Browser</text>
    <text x="200" y="266" text-anchor="middle" font-size="9" fill="#D6EAF8">Playwright</text>

    <!-- Terminal -->
    <rect x="360" y="230" width="180" height="45" rx="8" fill="url(#toolGrad)" filter="url(#shadow)"/>
    <text x="450" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⌨️ Terminal</text>
    <text x="450" y="266" text-anchor="middle" font-size="9" fill="#D6EAF8">Bash / Code exec</text>

    <!-- File I/O -->
    <rect x="610" y="230" width="180" height="45" rx="8" fill="url(#toolGrad)" filter="url(#shadow)"/>
    <text x="700" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📁 File I/O</text>
    <text x="700" y="266" text-anchor="middle" font-size="9" fill="#D6EAF8">Read / Write</text>

    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- LAYER 4: Intranet services (from Browser) -->
  <g opacity="0">
    <!-- Arrows from browser down -->
    <line x1="140" y1="275" x2="140" y2="315" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="200" y1="275" x2="310" y2="315" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="230" y1="275" x2="480" y2="315" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="260" y1="275" x2="650" y2="315" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- GitLab -->
    <rect x="55" y="320" width="155" height="50" rx="8" fill="url(#serviceGrad)" filter="url(#shadow)"/>
    <text x="132" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="white">GitLab</text>
    <text x="132" y="358" text-anchor="middle" font-size="9" fill="#D5F5E3">Code &amp; Repos</text>

    <!-- Plane -->
    <rect x="230" y="320" width="155" height="50" rx="8" fill="url(#serviceGrad)" filter="url(#shadow)"/>
    <text x="307" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Plane</text>
    <text x="307" y="358" text-anchor="middle" font-size="9" fill="#D5F5E3">Project Mgmt</text>

    <!-- RocketChat -->
    <rect x="405" y="320" width="155" height="50" rx="8" fill="url(#serviceGrad)" filter="url(#shadow)"/>
    <text x="482" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="white">RocketChat</text>
    <text x="482" y="358" text-anchor="middle" font-size="9" fill="#D5F5E3">Communication</text>

    <!-- OwnCloud -->
    <rect x="580" y="320" width="155" height="50" rx="8" fill="url(#serviceGrad)" filter="url(#shadow)"/>
    <text x="657" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="white">OwnCloud</text>
    <text x="657" y="358" text-anchor="middle" font-size="9" fill="#D5F5E3">Documents</text>

    <!-- Label -->
    <text x="790" y="345" font-size="9" fill="#7F8C8D" font-style="italic">Intranet</text>
    <text x="790" y="358" font-size="9" fill="#7F8C8D" font-style="italic">(Docker)</text>

    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.6s" fill="freeze"/>
  </g>

  <!-- LAYER 5: NPC Colleagues (from RocketChat) - RED highlight -->
  <g opacity="0">
    <line x1="482" y1="370" x2="482" y2="405" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>

    <rect x="370" y="410" width="225" height="55" rx="10" fill="url(#npcGrad)" filter="url(#shadow)"/>
    <text x="482" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="white">👥 Simulated Colleagues</text>
    <text x="482" y="448" text-anchor="middle" font-size="9" fill="#FADBD8">Claude 3.5 Sonnet NPCs via Sotopia</text>
    <text x="482" y="460" text-anchor="middle" font-size="8" fill="#F5B7B1">⚠️ Fixed backbone — not the agent under test</text>

    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.6s" fill="freeze"/>
  </g>

  <!-- LAYER 6: Evaluation -->
  <g opacity="0">
    <!-- Separator line -->
    <line x1="50" y1="490" x2="850" y2="490" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="450" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F8C8D">EVALUATION LAYER</text>

    <!-- Deterministic -->
    <rect x="120" y="525" width="220" height="50" rx="8" fill="url(#evalGrad)" filter="url(#shadow)"/>
    <text x="230" y="547" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✅ Deterministic</text>
    <text x="230" y="563" text-anchor="middle" font-size="9" fill="#FEF9E7">Python evaluators</text>

    <!-- LLM-as-Judge -->
    <rect x="400" y="525" width="220" height="50" rx="8" fill="url(#evalGrad)" filter="url(#shadow)"/>
    <text x="510" y="547" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🧑‍⚖️ LLM-as-Judge</text>
    <text x="510" y="563" text-anchor="middle" font-size="9" fill="#FEF9E7">Claude 3.5 Sonnet</text>

    <!-- Result -->
    <rect x="680" y="525" width="140" height="50" rx="8" fill="#2ECC71" filter="url(#shadow)"/>
    <text x="750" y="547" text-anchor="middle" font-size="11" font-weight="bold" fill="white">S_partial</text>
    <text x="750" y="563" text-anchor="middle" font-size="9" fill="#D5F5E3">0.5·frac + 0.5·full</text>

    <!-- Arrows to result -->
    <line x1="340" y1="550" x2="400" y2="550" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="620" y1="550" x2="680" y2="550" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.6s" fill="freeze"/>
  </g>

  <!-- Final label -->
  <g opacity="0">
    <text x="450" y="608" text-anchor="middle" font-size="9" fill="#95A5A6">All services self-hosted via Docker · 175 tasks · Fully reproducible</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
